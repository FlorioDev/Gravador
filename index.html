<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gravador de Tela</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f5f3;
    --surface: #ffffff;
    --surface2: #f0efeb;
    --border: #e0ddd6;
    --border2: #ccc9c0;
    --accent: #1a1a1a;
    --accent2: #333;
    --red: #dc2626;
    --red2: #b91c1c;
    --green: #16a34a;
    --blue: #2563eb;
    --text: #1a1a1a;
    --text2: #6b6860;
    --text3: #a8a49c;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 16px 64px;
  }

  /* ── HEADER ── */
  header {
    width: 100%;
    max-width: 900px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 32px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 18px;
  }
  .header-left { display: flex; align-items: baseline; gap: 12px; }
  header h1 {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text);
  }
  header .subtitle {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text3);
    letter-spacing: 0.1em;
  }
  .header-badge {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .1em;
    color: var(--text2);
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 12px;
  }
  .dot-live {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--red);
    display: inline-block;
    animation: pulse-live 1.2s ease-in-out infinite;
    opacity: 0;
    transition: opacity .3s;
  }
  .dot-live.active { opacity: 1; }
  @keyframes pulse-live {
    0%,100%{opacity:1;transform:scale(1)}
    50%{opacity:.4;transform:scale(.7)}
  }

  /* ── MAIN LAYOUT ── */
  main {
    width: 100%;
    max-width: 900px;
    display: grid;
    grid-template-columns: 1fr 272px;
    gap: 16px;
  }

  /* ── VIDEO PREVIEW ── */
  .preview-wrap {
    position: relative;
    background: #1a1a1a;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    aspect-ratio: 16/9;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 1px 4px rgba(0,0,0,.08);
  }
  #livePreview {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: none;
  }
  .preview-placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    color: #555;
  }
  .preview-placeholder svg { opacity: .25; }
  .preview-placeholder p {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: #666;
  }
  .preview-overlay {
    position: absolute;
    top: 12px; left: 12px;
    background: rgba(0,0,0,.75);
    border-radius: 4px;
    padding: 5px 11px;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 600;
    color: #fff;
    display: none;
    align-items: center;
    gap: 6px;
    letter-spacing: .06em;
    backdrop-filter: blur(4px);
  }
  .preview-overlay.visible { display: flex; }

  /* ── VU METER ── */
  .vu-wrap {
    position: absolute;
    bottom: 12px; left: 12px; right: 12px;
    display: none;
    gap: 2px;
    align-items: flex-end;
    height: 28px;
  }
  .vu-wrap.visible { display: flex; }
  .vu-bar {
    flex: 1;
    background: #4ade80;
    border-radius: 1px;
    transition: height .06s ease;
    height: 3px;
    max-height: 28px;
    opacity: .8;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 18px;
    box-shadow: 0 1px 3px rgba(0,0,0,.04);
  }
  .panel-title {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 14px;
  }

  /* ── TOGGLE ROWS ── */
  .toggle-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 9px 0;
    border-bottom: 1px solid var(--border);
  }
  .toggle-row:last-child { border-bottom: none; padding-bottom: 0; }
  .toggle-label { display: flex; flex-direction: column; gap: 2px; }
  .toggle-label span:first-child { font-size: 13px; font-weight: 400; color: var(--text); }
  .toggle-label span:last-child { font-family: var(--mono); font-size: 10px; color: var(--text3); }

  /* Switch */
  .switch { position: relative; width: 38px; height: 22px; flex-shrink: 0; }
  .switch input { opacity: 0; width: 0; height: 0; }
  .slider {
    position: absolute; inset: 0;
    background: var(--border2);
    border-radius: 11px;
    cursor: pointer;
    transition: background .2s;
  }
  .slider::before {
    content: '';
    position: absolute;
    left: 3px; top: 3px;
    width: 16px; height: 16px;
    background: #fff;
    border-radius: 50%;
    transition: transform .2s;
    box-shadow: 0 1px 3px rgba(0,0,0,.2);
  }
  .switch input:checked + .slider { background: var(--accent); }
  .switch input:checked + .slider::before { transform: translateX(16px); }

  /* ── SELECT ── */
  .select-row {
    display: flex;
    flex-direction: column;
    gap: 5px;
    padding: 9px 0;
    border-bottom: 1px solid var(--border);
  }
  .select-row:last-child { border-bottom: none; }
  .select-row label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--text3);
  }
  select {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    padding: 7px 10px;
    border-radius: 6px;
    appearance: none;
    cursor: pointer;
    outline: none;
    width: 100%;
    transition: border .15s;
  }
  select:focus { border-color: var(--accent); }
  select:disabled { opacity: .4; cursor: not-allowed; }

  /* ── FORMAT BADGE ── */
  .format-badge {
    font-family: var(--mono);
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 4px;
    display: inline-block;
    margin-top: 3px;
  }
  .format-badge.mp4  { background: #dcfce7; color: #15803d; border: 1px solid #bbf7d0; }
  .format-badge.webm { background: #fef9c3; color: #854d0e; border: 1px solid #fde047; }

  /* ── TIMER ── */
  .timer-display {
    font-family: var(--mono);
    font-size: 30px;
    font-weight: 500;
    color: var(--text);
    letter-spacing: .05em;
    text-align: center;
    padding: 14px 0 6px;
  }
  .timer-display.recording { color: var(--red); }
  .timer-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: var(--text3);
    text-align: center;
    margin-bottom: 2px;
  }

  /* ── STATUS ── */
  .status-line {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text3);
    text-align: center;
    min-height: 16px;
    transition: color .3s;
    margin-top: 6px;
  }
  .status-line.ok  { color: var(--green); }
  .status-line.err { color: var(--red); }
  .status-line.rec { color: var(--red); }

  /* ── BUTTONS ── */
  .btn-group {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 10px;
  }
  .btn {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: .08em;
    text-transform: uppercase;
    border: none;
    border-radius: 6px;
    padding: 11px 8px;
    cursor: pointer;
    transition: all .15s;
    outline: none;
  }
  .btn:disabled { opacity: .3; cursor: not-allowed; }

  .btn-record {
    background: var(--accent);
    color: #fff;
    grid-column: 1 / -1;
  }
  .btn-record:hover:not(:disabled) { background: #333; }
  .btn-record.recording {
    background: var(--red);
    animation: record-pulse 2s ease-in-out infinite;
  }
  .btn-record.recording:hover:not(:disabled) { background: var(--red2); animation: none; }
  @keyframes record-pulse {
    0%,100%{box-shadow:0 0 0 0 rgba(220,38,38,.3)}
    50%{box-shadow:0 0 0 8px rgba(220,38,38,0)}
  }

  .btn-pause {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-pause:hover:not(:disabled) { border-color: var(--accent); }

  .btn-save {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-save:hover:not(:disabled) { border-color: var(--red); color: var(--red); }

  /* ── RECORDINGS ── */
  .recordings-wrap { grid-column: 1 / -1; margin-top: 4px; }
  .recordings-title {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 10px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }
  .recordings-list { display: flex; flex-direction: column; gap: 8px; }
  .rec-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    display: grid;
    grid-template-columns: 1fr auto auto;
    gap: 10px;
    align-items: center;
    box-shadow: 0 1px 3px rgba(0,0,0,.04);
  }
  .rec-item video {
    grid-column: 1 / -1;
    width: 100%;
    border-radius: 4px;
    max-height: 220px;
    background: #000;
  }
  .rec-name { font-family: var(--mono); font-size: 12px; color: var(--text); }
  .rec-meta { font-family: var(--mono); font-size: 11px; color: var(--text3); margin-top: 2px; }
  .rec-format {
    font-family: var(--mono); font-size: 10px;
    padding: 1px 6px; border-radius: 3px;
    display: inline-block; margin-left: 4px;
  }
  .rec-format.mp4  { background: #dcfce7; color: #15803d; }
  .rec-format.webm { background: #fef9c3; color: #854d0e; }

  .btn-dl {
    font-family: var(--mono); font-size: 11px; font-weight: 600;
    letter-spacing: .06em; text-transform: uppercase;
    background: var(--accent); color: #fff;
    border: none; border-radius: 5px;
    padding: 7px 12px; cursor: pointer;
    transition: all .15s; text-decoration: none;
    white-space: nowrap;
  }
  .btn-dl:hover { background: #333; }
  .btn-del {
    font-family: var(--mono); font-size: 11px;
    background: transparent; border: 1px solid var(--border);
    color: var(--text3); border-radius: 5px;
    padding: 7px 10px; cursor: pointer; transition: all .15s;
  }
  .btn-del:hover { border-color: var(--red); color: var(--red); }

  .no-recordings {
    font-family: var(--mono); font-size: 11px;
    color: var(--text3); padding: 24px 0; text-align: center;
    border: 1px dashed var(--border); border-radius: 8px; letter-spacing: .06em;
  }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  @media (max-width: 640px) {
    main { grid-template-columns: 1fr; }
    .recordings-wrap { grid-column: 1; }
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1><span class="dot-live" id="dotLive"></span>Screen Recorder</h1>
    <span class="subtitle" id="headerStatus">AGUARDANDO</span>
  </div>
  <div class="header-badge" id="formatBadgeHeader">
    <span id="detectedFormat">WebM</span>
  </div>
</header>

<main>
  <!-- VIDEO PREVIEW -->
  <div class="preview-wrap" id="previewWrap">
    <video id="livePreview" autoplay muted playsinline></video>
    <div class="preview-placeholder" id="placeholder">
      <svg width="52" height="52" viewBox="0 0 52 52" fill="none">
        <rect x="4" y="11" width="44" height="30" rx="4" stroke="#888" stroke-width="1.5"/>
        <circle cx="26" cy="26" r="9" stroke="#888" stroke-width="1.5"/>
        <circle cx="26" cy="26" r="3.5" fill="#888"/>
        <rect x="22" y="38" width="8" height="4" rx="1" fill="#888"/>
        <rect x="16" y="42" width="20" height="1.5" rx=".75" fill="#888"/>
      </svg>
      <p>Nenhuma gravação ativa</p>
    </div>
    <div class="preview-overlay" id="recBadge">
      <span style="color:#f87171;font-size:15px">●</span> REC <span id="overlayTime">00:00</span>
    </div>
    <div class="vu-wrap" id="vuWrap"></div>
  </div>

  <!-- SIDEBAR -->
  <div class="sidebar">

    <!-- TIMER -->
    <div class="panel">
      <div class="timer-label">Tempo gravado</div>
      <div class="timer-display" id="timerDisplay">00:00:00</div>
      <div class="status-line" id="statusLine">Pronto para gravar</div>
    </div>

    <!-- AUDIO -->
    <div class="panel">
      <div class="panel-title">Áudio</div>
      <div class="toggle-row">
        <div class="toggle-label">
          <span>Som do sistema</span>
          <span>Áudio da tela (Chrome/Edge)</span>
        </div>
        <label class="switch">
          <input type="checkbox" id="toggleSystemAudio" checked>
          <span class="slider"></span>
        </label>
      </div>
      <div class="toggle-row">
        <div class="toggle-label">
          <span>Microfone</span>
          <span>Voz / narração</span>
        </div>
        <label class="switch">
          <input type="checkbox" id="toggleMic" checked>
          <span class="slider"></span>
        </label>
      </div>
    </div>

    <!-- QUALITY -->
    <div class="panel">
      <div class="panel-title">Qualidade e formato</div>
      <div class="select-row">
        <label>Qualidade de vídeo</label>
        <select id="qualitySelect">
          <option value="8000000">Alta — 8 Mbps</option>
          <option value="4000000" selected>Média — 4 Mbps</option>
          <option value="1500000">Baixa — 1.5 Mbps</option>
        </select>
      </div>
      <div class="select-row">
        <label>Formato preferido</label>
        <select id="formatSelect">
          <option value="mp4_preferred">MP4 (preferido)</option>
          <option value="video/webm;codecs=vp9,opus">WebM / VP9</option>
          <option value="video/webm;codecs=vp8,opus">WebM / VP8</option>
        </select>
        <div id="formatNote" class="format-badge mp4">MP4 detectado ✓</div>
      </div>
    </div>

    <!-- CONTROLS -->
    <div class="panel">
      <div class="panel-title">Controles</div>
      <div class="btn-group">
        <button class="btn btn-record" id="btnRecord">⏺ Iniciar</button>
        <button class="btn btn-pause"  id="btnPause" disabled>⏸ Pausar</button>
        <button class="btn btn-save"   id="btnStop"  disabled>⏹ Parar</button>
      </div>
    </div>

  </div>

  <!-- RECORDINGS LIST -->
  <div class="recordings-wrap">
    <div class="panel">
      <div class="recordings-title">Gravações desta sessão</div>
      <div class="recordings-list" id="recordingsList">
        <div class="no-recordings" id="noRec">Nenhuma gravação ainda</div>
      </div>
    </div>
  </div>
</main>

<script>
// ── STATE ──────────────────────────────────────────────
let mediaRecorder = null;
let chunks = [];
let screenStream = null;
let micStream = null;
let mixedStream = null;
let audioCtx = null;
let analyser = null;
let animFrame = null;
let timerInterval = null;
let seconds = 0;
let isPaused = false;
let recCount = 0;
let vuBars = [];
let activeMime = '';

// ── MP4 MIME CANDIDATES (priority order) ─────────────
const MP4_MIMES = [
  'video/mp4;codecs=avc1.42E01E,mp4a.40.2',
  'video/mp4;codecs=avc1,mp4a.40.2',
  'video/mp4;codecs=h264,aac',
  'video/mp4;codecs=avc1',
  'video/mp4',
];
const WEBM_MIMES = [
  'video/webm;codecs=vp9,opus',
  'video/webm;codecs=vp8,opus',
  'video/webm',
];

function pickMime(preferMp4){
  const list = preferMp4 ? [...MP4_MIMES, ...WEBM_MIMES] : WEBM_MIMES;
  for(const m of list){
    if(MediaRecorder.isTypeSupported(m)) return m;
  }
  return '';
}

// ── DOM ────────────────────────────────────────────────
const btnRecord   = document.getElementById('btnRecord');
const btnPause    = document.getElementById('btnPause');
const btnStop     = document.getElementById('btnStop');
const livePreview = document.getElementById('livePreview');
const placeholder = document.getElementById('placeholder');
const timerDisp   = document.getElementById('timerDisplay');
const statusLine  = document.getElementById('statusLine');
const recBadge    = document.getElementById('recBadge');
const overlayTime = document.getElementById('overlayTime');
const vuWrap      = document.getElementById('vuWrap');
const dotLive     = document.getElementById('dotLive');
const headerStatus= document.getElementById('headerStatus');
const recList     = document.getElementById('recordingsList');
const noRec       = document.getElementById('noRec');
const toggleSys   = document.getElementById('toggleSystemAudio');
const toggleMic   = document.getElementById('toggleMic');
const qualSel     = document.getElementById('qualitySelect');
const fmtSel      = document.getElementById('formatSelect');
const formatNote  = document.getElementById('formatNote');
const detectedFmt = document.getElementById('detectedFormat');

// ── INIT: detect MP4 support ──────────────────────────
(function detectSupport(){
  const hasMp4 = MP4_MIMES.some(m => MediaRecorder.isTypeSupported(m));
  if(hasMp4){
    formatNote.textContent = 'MP4 suportado neste navegador ✓';
    formatNote.className = 'format-badge mp4';
    detectedFmt.textContent = 'MP4';
  } else {
    formatNote.textContent = 'MP4 não suportado → usará WebM';
    formatNote.className = 'format-badge webm';
    detectedFmt.textContent = 'WebM';
    // disable MP4 option
    fmtSel.options[0].text = 'MP4 (não suportado neste navegador)';
    fmtSel.options[0].disabled = true;
    fmtSel.selectedIndex = 1;
  }
  fmtSel.addEventListener('change', updateFormatNote);
})();

function updateFormatNote(){
  const val = fmtSel.value;
  if(val === 'mp4_preferred'){
    const ok = MP4_MIMES.some(m=>MediaRecorder.isTypeSupported(m));
    formatNote.textContent = ok ? 'MP4 suportado neste navegador ✓' : 'MP4 não suportado → usará WebM';
    formatNote.className = 'format-badge ' + (ok ? 'mp4' : 'webm');
    detectedFmt.textContent = ok ? 'MP4' : 'WebM';
  } else {
    const ext = val.includes('webm') ? 'WebM' : 'MP4';
    formatNote.textContent = MediaRecorder.isTypeSupported(val) ? ext+' ✓' : ext+' não suportado';
    formatNote.className = 'format-badge ' + (val.includes('webm') ? 'webm' : 'mp4');
    detectedFmt.textContent = ext;
  }
}

// ── VU BARS ───────────────────────────────────────────
(function initVU(){
  for(let i=0;i<32;i++){
    const b = document.createElement('div');
    b.className = 'vu-bar';
    vuWrap.appendChild(b);
    vuBars.push(b);
  }
})();

// ── TIMER ─────────────────────────────────────────────
function startTimer(){
  seconds = 0;
  timerInterval = setInterval(()=>{
    if(!isPaused){ seconds++; updateTimerDisplay(); }
  },1000);
}
function stopTimer(){ clearInterval(timerInterval); timerInterval = null; }
function updateTimerDisplay(){
  const h = Math.floor(seconds/3600).toString().padStart(2,'0');
  const m = Math.floor((seconds%3600)/60).toString().padStart(2,'0');
  const s = (seconds%60).toString().padStart(2,'0');
  timerDisp.textContent = `${h}:${m}:${s}`;
  overlayTime.textContent = `${m}:${s}`;
}

// ── AUDIO ANALYSER ────────────────────────────────────
function startAnalyser(stream){
  if(!stream.getAudioTracks().length) return;
  audioCtx = new AudioContext();
  const src = audioCtx.createMediaStreamSource(stream);
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 64;
  src.connect(analyser);
  const buf = new Uint8Array(analyser.frequencyBinCount);
  function draw(){
    animFrame = requestAnimationFrame(draw);
    analyser.getByteFrequencyData(buf);
    const n = Math.min(buf.length, vuBars.length);
    for(let i=0;i<vuBars.length;i++){
      const v = i < n ? buf[i]/255 : 0;
      vuBars[i].style.height = Math.max(3, v*28)+'px';
      vuBars[i].style.opacity = 0.4 + v*0.6;
    }
  }
  draw();
}
function stopAnalyser(){
  if(animFrame) cancelAnimationFrame(animFrame);
  animFrame = null;
  if(audioCtx){ audioCtx.close(); audioCtx = null; }
  vuBars.forEach(b=>{ b.style.height='3px'; });
}

// ── STATUS ────────────────────────────────────────────
function setStatus(msg, cls=''){
  statusLine.textContent = msg;
  statusLine.className = 'status-line' + (cls ? ' '+cls : '');
}

// ── RECORD ────────────────────────────────────────────
btnRecord.addEventListener('click', async ()=>{
  if(mediaRecorder && mediaRecorder.state !== 'inactive') return;
  try {
    setStatus('Aguardando permissão…');

    // 1. Screen
    screenStream = await navigator.mediaDevices.getDisplayMedia({
      video: { cursor: 'always' },
      audio: toggleSys.checked
    });

    // 2. Mic
    let audioTracks = [];
    if(toggleMic.checked){
      try {
        micStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
        audioTracks = micStream.getAudioTracks();
      } catch(e){
        setStatus('Mic indisponível — continuando sem mic', 'err');
        await new Promise(r=>setTimeout(r,1000));
      }
    }

    // 3. Mix
    const tracks = [...screenStream.getTracks(), ...audioTracks];
    mixedStream = new MediaStream(tracks);

    // 4. Preview
    livePreview.srcObject = mixedStream;
    livePreview.style.display = 'block';
    placeholder.style.display = 'none';

    // 5. VU
    if(mixedStream.getAudioTracks().length){
      vuWrap.classList.add('visible');
      startAnalyser(mixedStream);
    }

    // 6. MIME — MP4 priority
    const preferMp4 = fmtSel.value === 'mp4_preferred';
    if(preferMp4){
      activeMime = pickMime(true);
    } else {
      activeMime = MediaRecorder.isTypeSupported(fmtSel.value) ? fmtSel.value : pickMime(false);
    }
    if(!activeMime){ activeMime = 'video/webm'; }

    // 7. MediaRecorder
    chunks = [];
    mediaRecorder = new MediaRecorder(mixedStream, {
      mimeType: activeMime,
      videoBitsPerSecond: parseInt(qualSel.value)
    });
    mediaRecorder.ondataavailable = e => { if(e.data.size>0) chunks.push(e.data); };
    mediaRecorder.onstop = saveRecording;
    mediaRecorder.start(1000);

    const ext = activeMime.includes('mp4') ? 'MP4' : 'WebM';
    const isMP4 = activeMime.includes('mp4');

    // 8. UI
    isPaused = false;
    startTimer();
    btnRecord.textContent = '⏺ Gravando…';
    btnRecord.classList.add('recording');
    btnRecord.disabled = true;
    btnPause.disabled = false;
    btnStop.disabled = false;
    toggleSys.disabled = true;
    toggleMic.disabled = true;
    qualSel.disabled = true;
    fmtSel.disabled = true;
    timerDisp.classList.add('recording');
    recBadge.classList.add('visible');
    dotLive.classList.add('active');
    headerStatus.textContent = '● GRAVANDO';
    setStatus(`Gravando em ${ext}…`, 'rec');

    screenStream.getVideoTracks()[0].addEventListener('ended', ()=>{
      if(mediaRecorder && mediaRecorder.state !== 'inactive') stopRecording();
    });

  } catch(e){
    setStatus('Erro: ' + (e.message||e), 'err');
    cleanupStreams();
  }
});

// ── PAUSE ─────────────────────────────────────────────
btnPause.addEventListener('click', ()=>{
  if(!mediaRecorder) return;
  if(mediaRecorder.state === 'recording'){
    mediaRecorder.pause();
    isPaused = true;
    btnPause.textContent = '▶ Retomar';
    setStatus('Pausado');
    dotLive.classList.remove('active');
    headerStatus.textContent = '⏸ PAUSADO';
  } else if(mediaRecorder.state === 'paused'){
    mediaRecorder.resume();
    isPaused = false;
    btnPause.textContent = '⏸ Pausar';
    const ext = activeMime.includes('mp4') ? 'MP4' : 'WebM';
    setStatus(`Gravando em ${ext}…`, 'rec');
    dotLive.classList.add('active');
    headerStatus.textContent = '● GRAVANDO';
  }
});

// ── STOP ──────────────────────────────────────────────
btnStop.addEventListener('click', stopRecording);

function stopRecording(){
  if(!mediaRecorder || mediaRecorder.state === 'inactive') return;
  mediaRecorder.stop();
  stopTimer();
  stopAnalyser();
  cleanupStreams();
  resetUI();
}

function cleanupStreams(){
  if(screenStream){ screenStream.getTracks().forEach(t=>t.stop()); screenStream=null; }
  if(micStream){ micStream.getTracks().forEach(t=>t.stop()); micStream=null; }
  livePreview.srcObject = null;
  livePreview.style.display = 'none';
  placeholder.style.display = 'flex';
  vuWrap.classList.remove('visible');
}

function resetUI(){
  btnRecord.textContent = '⏺ Iniciar';
  btnRecord.classList.remove('recording');
  btnRecord.disabled = false;
  btnPause.disabled = true;
  btnPause.textContent = '⏸ Pausar';
  btnStop.disabled = true;
  toggleSys.disabled = false;
  toggleMic.disabled = false;
  qualSel.disabled = false;
  fmtSel.disabled = false;
  timerDisp.classList.remove('recording');
  recBadge.classList.remove('visible');
  dotLive.classList.remove('active');
  timerDisp.textContent = '00:00:00';
  headerStatus.textContent = 'AGUARDANDO';
  setStatus('Gravação salva ✓', 'ok');
  setTimeout(()=>setStatus('Pronto para gravar'), 3000);
}

// ── SAVE ──────────────────────────────────────────────
function saveRecording(){
  if(!chunks.length) return;
  recCount++;
  const blob = new Blob(chunks, { type: activeMime });
  const url  = URL.createObjectURL(blob);
  const isMp4 = activeMime.includes('mp4');
  const ext  = isMp4 ? 'mp4' : 'webm';
  const name = `gravacao_${String(recCount).padStart(2,'0')}_${timestamp()}`;
  const size = (blob.size/1024/1024).toFixed(2);
  const dur  = seconds;

  noRec.style.display = 'none';

  const item = document.createElement('div');
  item.className = 'rec-item';
  item.innerHTML = `
    <video src="${url}" controls></video>
    <div>
      <div class="rec-name">${name}.${ext} <span class="rec-format ${ext}">${ext.toUpperCase()}</span></div>
      <div class="rec-meta">${formatDur(dur)} · ${size} MB</div>
    </div>
    <a class="btn-dl" href="${url}" download="${name}.${ext}">↓ Baixar</a>
    <button class="btn-del" onclick="removeRec(this,'${url}')">✕</button>
  `;
  recList.prepend(item);
  chunks = [];
}

function removeRec(btn, url){
  URL.revokeObjectURL(url);
  btn.closest('.rec-item').remove();
  if(!recList.querySelector('.rec-item')) noRec.style.display = '';
}

function timestamp(){
  const d = new Date();
  return [d.getFullYear(),
    String(d.getMonth()+1).padStart(2,'0'),
    String(d.getDate()).padStart(2,'0'),
    String(d.getHours()).padStart(2,'0'),
    String(d.getMinutes()).padStart(2,'0')].join('');
}
function formatDur(s){
  const m = Math.floor(s/60);
  const ss = s%60;
  return `${m}m ${ss}s`;
}
</script>
